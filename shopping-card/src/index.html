<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="output.css" />
    <script
      src="https://kit.fontawesome.com/f12c1313f0.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="h-screen flex justify-center items-center">
      <div class="h-96 w-70 border rounded-2xl overflow-hidden relative">
        <div class="h-[50%]">
          <img
            src="https://images.unsplash.com/photo-1773332585760-8b5dc6079a74?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDF8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw4fHx8ZW58MHx8fHx8"
            alt=""
            class="h-full w-full"
          />
        </div>

        <div class="h-[50%] px-4 py-2">
          <h2 class="text-xl font-semibold/50 text-gray-500 uppercase">
            Watches
          </h2>
          <h1 class="text-2xl font-bold">Minimalist Watch Pro</h1>
          <div class="flex bg-yellow-50 items-center justify-start gap-2">
            <ul class="flex gap-1/2">
              <li><i class="fa-regular fa-star"></i></li>
              <li><i class="fa-regular fa-star"></i></li>
              <li><i class="fa-regular fa-star"></i></li>
              <li><i class="fa-regular fa-star"></i></li>
            </ul>
            <span>(128)</span>
          </div>

          <div class="flex items-center justify-between mt-10">
            <div class="flex gap-2">
              <span>3199</span>
              <span class="line-through">3999</span>
            </div>
            <button class="bg-indigo-400 px-4 py-2 rounded-lg cursor-pointer text-white">Add to Card</button>
          </div>
        </div>

        <div class="absolute top-4 left-2 bg-red-300 rounded-full px-2 py-1 text-white font-bold cursor-pointer">-20%</div>
      </div>
    </div>
  </body>
</html>
