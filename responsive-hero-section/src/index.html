<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="output.css" />
    <script
      src="https://kit.fontawesome.com/f12c1313f0.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header class="bg-indigo-300">
      <div
        class="max-w-7xl mx-auto flex h-16 items-center justify-between px-10"
      >
        <h1>BongoIT</h1>

        <nav class="hidden md:flex gap-6 text-lg">
          <a href="#">Home</a>
          <a href="#">Services</a>
          <a href="#">About</a>
          <a href="#">Testimonials</a>
        </nav>

        <div class="hidden md:flex gap-6">
          <button
            class="bg-orange-300 px-4 py-2 rounded-xl cursor-pointer text-white font-bold"
          >
            Login
          </button>
          <button
            class="border-2 border-orange-300 px-4 py-2 rounded-xl cursor-pointer text-black font-semibold"
          >
            Signup
          </button>
        </div>

        <div class="flex md:hidden text-2xl">
          <i class="fa-solid fa-bars"></i>
        </div>
      </div>
    </header>

    <section
      class="min-h-[calc(100vh-64px)] bg-gradient-to-t from-blue-100 via-blue-300 to-blue-500"
    >
      <div class="max-w-7xl mx-auto h-full flex flex-col items-center py-16">
        <div class="bg-gray-300/50 text-white font-bold px-4 py-2 rounded-full flex items-center gap-2">
          <span class="h-4 w-4 bg-green-400 rounded-full "></span>
          <p>Empowering Digital Transformation</p>
        </div>

        <h1 class="text-5xl max-w-2xl text-center font-bold mt-6">We Build Digital Experiences That Matter</h1>
        <p class="max-w-2xl text-center text-2xl text-black/50 mt-10 px-4">
          Bongo IT delivers cutting-edge software solutions, cloud
          infrastructure, and AI-powered products that drive growth for
          businesses worldwide.
        </p>
        <div class="flex flex-col sm:flex-row gap-4 mt-10">
            <button class="px-4 py-2 bg-orange-300 rounded-lg cursor-pointer text-white font-bold">Start Your Project</button>
            <button class="px-4 py-2 border-2 border-orange-300 rounded-lg cursor-pointer text-white font-bold">Watch Demo</button>
        </div>
      </div>
    </section>
  </body>
</html>
